@if (user()) {
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow">
        <div class="row g-0">
          <div class="col-md-4">
            <img
              [src]="user()!.image"
              class="img-fluid rounded-start h-100"
              style="object-fit: cover; min-height: 250px"
              [alt]="user()!.first_name"
            />
          </div>
          <div class="col-md-8">
            <div class="card-body">
              <h3 class="card-title mb-1">
                {{ user()!.first_name }} {{ user()!.last_name }}
              </h3>
              <p class="text-muted small mb-3">&#64;{{ user()!.username }}</p>

              <ul class="list-group list-group-flush mb-4">
                <li class="list-group-item px-0">
                  <strong>Usuario:</strong> {{ user()!.username }}
                </li>
                <li class="list-group-item px-0">
                  <strong>Email:</strong> {{ user()!.email }}
                </li>
              </ul>

              <div class="d-flex gap-2 flex-wrap">
                <a routerLink="/home" class="btn btn-secondary btn-sm">
                  &#8592; Volver al listado
                </a>
                <a
                  [routerLink]="['/updateuser', user()!._id]"
                  class="btn btn-warning btn-sm"
                >
                  Actualizar
                </a>
                <button class="btn btn-danger btn-sm">Eliminar</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
} @else {
  <div class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="mt-2 text-muted">Cargando usuario...</p>
  </div>
}
