<div class="card h-100 shadow-sm">
  <img
    [src]="user().image"
    class="card-img-top"
    style="height: 200px; object-fit: cover"
    [alt]="user().first_name"
  />
  <div class="card-body text-center">
    <h6 class="card-title fw-bold">{{ user().first_name }} {{ user().last_name }}</h6>
    <p class="text-muted small mb-0">{{ user().username }}</p>
  </div>
  <div class="card-footer d-flex justify-content-between gap-1 p-2">
    <a [routerLink]="['/user', user()._id]" class="btn btn-primary btn-sm flex-fill">
      <i class="bi bi-eye"></i> Ver
    </a>
    <a [routerLink]="['/updateuser', user()._id]" class="btn btn-warning btn-sm flex-fill">
      <i class="bi bi-pencil"></i> Editar
    </a>
    <button class="btn btn-danger btn-sm flex-fill" (click)="onDelete.emit(user())">
      <i class="bi bi-trash"></i> Borrar
    </button>
  </div>
</div>
